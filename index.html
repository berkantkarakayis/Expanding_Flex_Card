<!DOCTYPE html>
<html lang="en" class="theme_switchable">
<head>
  <meta charset="UTF-8">
  <title>Expanding flex cards</title>
  <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.0/normalize.min.css'>
<link rel='stylesheet' href='https://static.fontawesome.com/css/fontawesome-app.css'>
<link rel='stylesheet' href='https://pro.fontawesome.com/releases/v5.2.0/css/all.css'>
<link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto:400,700'><link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="options">
   <div class="option active" style="--optionBackground:url(https://www.mercedes-benz.com.tr/content/dam/hq/passengercars/cars/c-class/c-class-saloon-w206-pi/overview/spa/02-2025/images/mercedes-benz-c-class-w206-spa-front-2400x2400-02-2025.jpg);">
      <div class="shadow"></div>
      <div class="label">
         <div class="icon">
            <i class="fas fa-car"></i>
         </div>
         <div class="info">
            <div class="main">C-Serisi Sedan</div>
            <div class="sub">Konfor alanına hoş geldin.</div>
         </div>
      </div>
   </div>
   <div class="option" style="--optionBackground:url(https://www.mbusa.com/content/dam/mb-nafta/us/myco/my26/sl-class/class-page/2026-SL-ROADSTER-CT-4-5-2-DR.jpg);">
      <div class="shadow"></div>
      <div class="label">
         <div class="icon">
            <i class="fas fa-car-alt"></i>
         </div>
         <div class="info">
            <div class="main">Mercedes-AMG SL Roadster</div>
            <div class="sub">Yıldız yeniden doğdu.</div>
         </div>
      </div>
   </div>
   <div class="option" style="--optionBackground:url(https://www.mercedes-benz.com.tr/content/dam/hq/passengercars/cars/amg-gt/amg-gt-63-s-e-performance-c192/overview/spa-highlights/07-2025/images/mercedes-amg-gt-63-se-perf-c192-spa-01-2400x2400-07-2025.jpg);">
      <div class="shadow"></div>
      <div class="label">
         <div class="icon">
            <i class="fas fa-bomb"></i>
         </div>
         <div class="info">
            <div class="main">Mercedes-AMG GT Coupé</div>
            <div class="sub">Yakında sizinle.</div>
         </div>
      </div>
   </div>
   <div class="option" style="--optionBackground:url(https://gmz.ae/wp-content/uploads/2022/05/Rent-Mercedes-Benz-G63-in-Dubai.jpeg);">
      <div class="shadow"></div>
      <div class="label">
         <div class="icon">
            <i class="fas fa-truck-pickup"></i>
         </div>
         <div class="info">
            <div class="main">G-Serisi</div>
            <div class="sub">Zamandan daha güçlü.</div>
         </div>
      </div>
   </div>
   <div class="option" style="--optionBackground:url(https://www.mercedes-benz.com.tr/content/dam/hq/passengercars/cars/eqe/saloon-v295-pi/overview/spa-highlights/02-2025/images/mercedes-benz-eqe-v295-spa-highlights-exterior-2400x2400-02-2025.jpg?im=Resize,width=1184);">
      <div class="shadow"></div>
      <div class="label">
         <div class="icon">
            <i class="fas fa-bolt"></i>
         </div>
         <div class="info">
            <div class="main">Tamamen Elektrikli EQE.</div>
            <div class="sub">Hislerinizi harekete geçirin.</div>
         </div>
      </div>
   </div>
</div>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js'></script>
<script  src="./script.js"></script>
</body>
</html>
